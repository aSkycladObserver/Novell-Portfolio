  - path: school/egghart_06.jpg
    meta:
      title: Egghart Research 1
      description: "Exploration for the main design, I wanted to mix the two ideas of a knight and a cook on the road, looking for rare ingredients while needing to fend for himself. "
      collections:
        - school
