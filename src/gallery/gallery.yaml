      title: Egghart Research 2
      description: "The cockatrice was chosen very quickly as a house crest and familiar. The rooster elements were very fun to include in the designs."
      collections:
        - school
  - path: school/Wasps_01.jpg
    meta:
      title: Inkeater Wasps
      description: "Group of alien bugs / mobs from a faraway planet. They feed on INK, the planet's main resource, which gives them this blueish swellings."
      collections:
        - school
  - path: school/Wasps_05.jpg
    meta:
      title: Inkeater Wasps 2
      description: "Early exploration for the three types of creatures : I needed an aggressive mob, a friendly one and a boss / queen of the hive type. They all had to be part of the same family and influenced by the planet they live on."
      collections:
        - school
  - path: school/Wasps_02.jpg
    meta:
      title: Inkeater Ink Keeper
      description: "The friendly mostly inoffensive guy. Works as a feeder for the hive."
      collections:
        - school
  - path: school/Wasps_03.jpg
    meta:
      title: Inkeater Marauder
      description: "The marauder is my favorite of the bunch. It's the aggressive wasp-like mob that is the most present out of the hive."
      collections:
        - school
  - path: school/Wasps_04.jpg
    meta:
      title: Inkeater Shieldmaiden
      description: "Shieldmaidens are the bugs that were supposed to become queens, but failed in their growth and became sterile. Their size and strength still allows them to defend their hive."
      collections:
        - school
